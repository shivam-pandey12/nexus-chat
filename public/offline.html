<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c9953d" />
    <title>Nexus Chat - Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f1df;
        --panel: rgba(255, 252, 245, 0.88);
        --line: rgba(201, 149, 61, 0.28);
        --text: #211c16;
        --muted: #6c6259;
        --gold: #c9953d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 10%, rgba(201, 149, 61, 0.2), transparent 28rem),
          radial-gradient(circle at 86% 18%, rgba(142, 202, 255, 0.18), transparent 30rem),
          linear-gradient(135deg, #fffaf0 0%, var(--bg) 55%, #f1e3c7 100%);
      }

      main {
        width: min(680px, 100%);
        border: 1px solid var(--line);
        border-radius: 32px;
        padding: clamp(28px, 6vw, 56px);
        background: var(--panel);
        box-shadow: 0 30px 90px rgba(69, 50, 20, 0.18);
        text-align: center;
      }

      .mark {
        width: 76px;
        height: 76px;
        margin: 0 auto 22px;
        display: grid;
        place-items: center;
        border-radius: 28px;
        color: #111;
        font-weight: 950;
        font-size: 30px;
        background: linear-gradient(145deg, #fff8e7, #d5a64b);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8), 0 20px 45px rgba(201, 149, 61, 0.28);
      }

      p:first-of-type {
        margin: 0 0 10px;
        color: var(--gold);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(36px, 7vw, 64px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 18px auto 0;
        max-width: 48ch;
        color: var(--muted);
        font-size: clamp(16px, 3vw, 19px);
        line-height: 1.7;
      }

      button {
        margin-top: 28px;
        min-height: 48px;
        border: 0;
        border-radius: 999px;
        padding: 0 24px;
        color: #fff;
        font: inherit;
        font-weight: 900;
        background: linear-gradient(135deg, #111, #3b2b16 52%, var(--gold));
        box-shadow: 0 18px 40px rgba(34, 25, 10, 0.22);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">N</div>
      <p>Offline shell</p>
      <h1>You&apos;re offline</h1>
      <p>
        Nexus Chat can keep the app shell open, but live rooms need a network connection.
        Reconnect and refresh to restore chat, rooms, notifications, and billing safely.
      </p>
      <button type="button" onclick="window.location.reload()">Try reconnecting</button>
    </main>
  </body>
</html>
